name: Fetch Release Asset Download Counts

on:
  schedule:
    - cron: '0 0 * * *'  # Runs once a day at midnight UTC

jobs:
  report_download_counts:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch download counts
        run: |
          # Define the repositories to fetch data from.
          REPOS=("Aryeah86/Multi-Renamer" "Aryeah86/SamplySync")

          # Loop through each repository to get the release asset counts
          for REPO in "${REPOS[@]}"; do
            echo "Fetching release assets for $REPO"
            # Get releases and their download counts
            RELEASE_DATA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$REPO/releases")
            # Iterate through each release
            for ASSET in $(echo "$RELEASE_DATA" | jq -c '.[] | .assets[]'); do
              ASSET_NAME=$(echo "$ASSET" | jq -r .name)
              DOWNLOAD_COUNT=$(echo "$ASSET" | jq -r .download_count)
              echo "Asset: $ASSET_NAME - Downloads: $DOWNLOAD_COUNT"
            done
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

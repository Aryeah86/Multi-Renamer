name: Build Native Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/windows
    paths:
      - 'windows-win32/**'
      - '.github/workflows/build-windows-native.yml'

permissions:
  contents: read

jobs:
  windows-native:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure native Windows app
        shell: pwsh
        run: |
          cmake -S windows-win32 -B windows-win32/build -A x64

      - name: Build native Windows app
        shell: pwsh
        run: |
          cmake --build windows-win32/build --config Release --parallel

      - name: Create installer and portable bundle
        shell: pwsh
        run: |
          cpack --config windows-win32/build/CPackConfig.cmake -C Release -G NSIS
          $exe = 'windows-win32/build/Release/WingMultitrackRenamer.exe'
          if (-not (Test-Path $exe)) {
            throw "Missing executable at $exe"
          }
          New-Item -ItemType Directory -Force -Path native-release | Out-Null
          Copy-Item -Force $exe 'native-release/WingMultitrackRenamer.exe'
          Get-ChildItem windows-win32/build/*.exe | Copy-Item -Destination native-release -Force

      - name: Upload native Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wing-multitrack-renamer-windows-native
          path: |
            native-release/WingMultitrackRenamer.exe
            native-release/Wing-Multitrack-Renamer-Windows.exe

name: Build Cross Platform App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/windows
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: electron-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron-app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run shared app tests
        run: npm test
      - name: Build Windows NSIS installer
        run: npx electron-builder --win nsis --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Smoke test unpacked app launch
        shell: pwsh
        run: |
          $exe = Join-Path $PWD 'release\win-unpacked\Wing Multitrack Renamer.exe'
          if (-not (Test-Path $exe)) {
            throw "Missing unpacked executable at $exe"
          }
          $process = Start-Process -FilePath $exe -ArgumentList '--smoke-test' -PassThru -Wait
          if ($process.ExitCode -ne 0) {
            throw "Windows app smoke test failed with exit code $($process.ExitCode)"
          }
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wing-multitrack-renamer-windows
          path: |
            electron-app/release/*.exe
            electron-app/release/*.yml

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - windows-installer
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: wing-multitrack-renamer-windows
          path: release-assets/windows

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          gh release create "$TAG_NAME" \
            release-assets/windows/* \
            --title "$TAG_NAME" \
            --generate-notes

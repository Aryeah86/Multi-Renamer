name: Build Cross Platform App

on:
  workflow_dispatch:
  push:
    paths:
      - 'electron-app/**'
      - '.github/workflows/build-electron.yml'

jobs:
  windows-installer:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: electron-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron-app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build Windows NSIS installer
        run: npx electron-builder --win nsis --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wing-multitrack-renamer-windows
          path: |
            electron-app/release/*.exe
            electron-app/release/*.yml

  mac-artifacts:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: electron-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron-app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build macOS dmg and zip
        run: npx electron-builder --mac dmg zip --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wing-multitrack-renamer-macos
          path: |
            electron-app/release/*.dmg
            electron-app/release/*.zip
            electron-app/release/*.blockmap
